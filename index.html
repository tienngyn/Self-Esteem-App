<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Die Sechs Säulen</title>
<style>
  :root {
    --bg: #000000;
    --card: #1C1C1E;
    --card2: #2C2C2E;
    --card3: #3A3A3C;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #FFFFFF;
    --text2: rgba(255,255,255,0.6);
    --text3: rgba(255,255,255,0.35);
    --accent: #FFFFFF;
    --accent2: rgba(255,255,255,0.18);
    --accent-rgb: 48,209,88;
    --blue: #0A84FF;
    --orange: #FF9F0A;
    --radius: 18px;
    --radius-sm: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .light-mode {
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --card2: #F2F2F7;
    --card3: #E5E5EA;
    --border: rgba(0,0,0,0.06);
    --border2: rgba(0,0,0,0.12);
    --text: #000000;
    --text2: rgba(0,0,0,0.55);
    --text3: rgba(0,0,0,0.30);
    --accent2: var(--accent-12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }
  body { overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }
  .flex-1 { flex: 1; min-height: 0; }
  .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
  .scrollable::-webkit-scrollbar { display: none; }

  /* NAV BAR */
  .nav-bar {
    display: flex; align-items: center; justify-content: space-around;
    background: rgba(28,28,30,0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); padding: 4px 0 4px;
    flex-shrink: 0; z-index: 100;
  }
  .nav-bar.hidden { display: none; }
  .light-mode .nav-bar { background: rgba(242,242,247,0.92); }
  .light-mode .nav-bar.hidden { display: none; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 16px; border-radius: 10px; transition: opacity 0.15s; flex: 1; }
  .nav-item:active { opacity: 0.6; }
  .nav-icon { font-size: 22px; line-height: 1; transition: color 0.2s; }
  .nav-label { font-size: 10px; font-weight: 500; color: var(--text3); transition: color 0.2s; margin-bottom: 0; }
  .nav-item.active .nav-icon, .nav-item.active .nav-label { color: var(--accent); }

  /* TOP BAR */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 8px; padding-top: max(12px, env(safe-area-inset-top)); flex-shrink: 0; }
  .top-bar-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .top-bar-sub { font-size: 14px; color: var(--text2); }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--card2); border: none; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
  .icon-btn:active { opacity: 0.6; }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin: 0 16px 10px; }
  .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .card-hero { background: linear-gradient(135deg, var(--accent2) 0%, var(--accent-07) 100%); border: 1px solid var(--accent-25); border-radius: var(--radius); padding: 16px; margin: 0 16px 10px; }
  .card-hero-blue { background: linear-gradient(135deg, #0D1C2F 0%, #060F1F 100%); border: 1px solid rgba(10,132,255,0.25); }

  /* THEME PICKER MODAL */
  #accent-modal { position: fixed; inset: 0; z-index: 9000; display: none; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.5); }
  #accent-modal.open { display: flex; }
  #accent-sheet { background: var(--card); border-radius: 24px 24px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 430px; max-height: 88vh; overflow-y: auto; }
  #accent-sheet::-webkit-scrollbar { display: none; }
  .accent-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .theme-card { border-radius: 16px; padding: 14px 14px 12px; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; position: relative; min-height: 88px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
  .theme-card:active { transform: scale(0.97); }
  .theme-card.selected { border-color: rgba(255,255,255,0.75); }
  .theme-card.selected::after { content: '\2713'; position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; background: rgba(255,255,255,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #000; }
  .theme-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.95); text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .theme-sub { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  #accent-close { width: 100%; background: var(--card2); border: none; color: var(--text); font-size: 16px; font-weight: 600; padding: 14px; border-radius: 14px; cursor: pointer; }
  #accent-close:active { opacity: 0.7; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .badge-green { background: var(--accent); color: #000; font-weight: 700; }
  .badge-gray { background: var(--card3); color: var(--text2); }
  .badge-blue { background: rgba(10,132,255,0.15); color: var(--blue); }
  .badge-orange { background: rgba(255,159,10,0.15); color: var(--orange); }

  /* PROGRESS DOTS */
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--card3); transition: all 0.3s; }
  .dot.done { background: var(--accent); }
  .dot.active { background: var(--accent); opacity: 0.5; box-shadow: 0 0 0 3px var(--accent-20); }

  /* WEEK LIST ITEM */
  .week-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .week-item:active { background: var(--card2); }
  .week-item:last-child { border-bottom: none; }
  .week-item.current-week { background: var(--accent2); border-left: 3px solid var(--accent); }
  .week-num { width: 36px; height: 36px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
  .week-num.done { background: var(--accent); color: #000; }
  .week-info { flex: 1; min-width: 0; }
  .week-name { font-size: 15px; font-weight: 600; }
  .week-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .week-arrow { color: var(--text3); font-size: 14px; }

  /* TABS */
  .tab-row { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; flex-shrink: 0; }
  .tab-row::-webkit-scrollbar { display: none; }
  .tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; background: var(--card); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab.done-tab { border-color: var(--accent); color: var(--accent); }

  /* ENTRY LIST */
  .entry-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .entry-item:last-child { border-bottom: none; }
  .entry-text { flex: 1; font-size: 15px; line-height: 1.5; }
  .entry-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
  .entry-del:active { color: #FF453A; }

  /* INPUT */
  .input-bar { display: flex; gap: 10px; padding: 12px 16px; background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .stem-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-size: 16px; color: var(--text); font-family: var(--font); outline: none; transition: border-color 0.2s; resize: none; height: 42px; overflow: hidden; line-height: 1.4; }
  .stem-input:focus { border-color: var(--accent); }
  .stem-input::placeholder { color: var(--text3); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: #000; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
  .send-btn:active { opacity: 0.7; }
  .send-btn:disabled { background: var(--card3); color: var(--text3); cursor: default; }

  /* STATS ROW */
  .stats-row { display: flex; gap: 8px; padding: 0 16px 10px; }
  .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 1px; font-weight: 500; }

  /* STEM CARD in focus */
  .stem-card { background: var(--card2); border-radius: var(--radius-sm); padding: 12px 14px; margin: 0 16px 10px; border: 1px solid var(--border); }
  .stem-card.active-stem { border-color: var(--accent); background: var(--accent2); }
  .stem-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stem-text { font-size: 17px; font-weight: 600; line-height: 1.4; }
  .stem-count { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stem-count.ready { color: var(--accent); }

  /* BACK BTN */
  .back-btn { background: none; border: none; color: var(--blue); font-size: 15px; font-weight: 400; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 0; }
  .back-btn:active { opacity: 0.6; }

  /* SECTION TITLE */
  .section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 20px; margin-bottom: 6px; }

  /* GUIDE */
  .pillar-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .pillar-item:last-child { border-bottom: none; }
  .pillar-num { width: 28px; height: 28px; border-radius: 8px; background: var(--accent2); color: var(--accent); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pillar-info { flex: 1; }
  .pillar-name { font-size: 15px; font-weight: 600; }
  .pillar-weeks { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* REFLECTION HEADER */
  .reflection-header { background: linear-gradient(135deg, #1F1A00 0%, #0F0D00 100%); border: 1px solid rgba(255,159,10,0.25); border-radius: var(--radius); padding: 16px 20px; margin: 0 16px 12px; }

  /* TOAST */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1px solid var(--border2); border-radius: 20px; padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--text); opacity: 0; transition: all 0.3s; z-index: 9999; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease forwards; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; line-height: 1.5; }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--card3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* LOCKED */
  .locked { opacity: 0.35; pointer-events: none; }

  /* CHECKBOX */
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--card3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
  .check-circle.done { background: var(--accent); border-color: var(--accent); color: #000; }
</style>
</head>
<body>
<div id="app">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="top-bar">
      <div>
        <div class="top-bar-title">Die Sechs Säulen</div>
        <div class="top-bar-sub">Selbstwert-Programm</div>
      </div>
      <button class="icon-btn" id="theme-toggle" title="Modus wechseln">&#9788;</button>
    </div>
    <div class="scrollable flex-1" id="home-scroll">
      <!-- content injected by JS -->
    </div>
  </div>

  <!-- WEEK LIST -->
  <div class="screen" id="screen-weeks">
    <div class="top-bar">
      <div class="top-bar-title">31 Wochen</div>
      <button class="icon-btn" id="theme-toggle2">&#9788;</button>
    </div>
    <div class="scrollable flex-1" id="weeks-scroll"></div>
  </div>

  <!-- WEEK DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));">
      <button class="back-btn" id="detail-back">&#8249; Wochen</button>
      <button class="icon-btn" id="theme-toggle3">&#9788;</button>
    </div>
    <div class="scrollable flex-1" id="detail-scroll"></div>
  </div>

  <!-- FOCUS -->
  <div class="screen" id="screen-focus">
    <div class="top-bar" style="padding-bottom:4px;padding-top:max(16px,env(safe-area-inset-top));">
      <button class="back-btn" id="focus-back">&#8249; Zurück</button>
      <div id="focus-header-right" style="font-size:13px;color:var(--text3);"></div>
    </div>
    <div id="focus-stem-info" style="padding:0 16px 8px;flex-shrink:0;"></div>
    <div class="tab-row" id="focus-day-tabs"></div>
    <div class="tab-row" id="focus-stem-tabs" style="padding-top:0;"></div>
    <div class="scrollable flex-1" id="focus-entries"></div>
    <div class="input-bar">
      <textarea class="stem-input" id="focus-input" placeholder="Vervollständige den Satz …" rows="1"></textarea>
      <button class="send-btn" id="focus-send">&#9650;</button>
    </div>
  </div>

  <!-- WEEKEND REFLECTION -->
  <div class="screen" id="screen-reflect">
    <div class="top-bar" style="padding-bottom:4px;padding-top:max(16px,env(safe-area-inset-top));">
      <button class="back-btn" id="reflect-back">&#8249; Zurück</button>
      <div style="font-size:13px;color:var(--text3);" id="reflect-week-label"></div>
    </div>
    <!-- Tab bar: Lesen / Reflektieren -->
    <div style="display:flex;gap:0;padding:0 16px 10px;flex-shrink:0;" id="reflect-tabs">
      <button id="reflect-tab-read" onclick="switchReflectTab('read')"
        style="flex:1;padding:9px 0;font-size:14px;font-weight:700;border:none;border-radius:12px 0 0 12px;cursor:pointer;transition:all 0.2s;">
        Eintr&#228;ge lesen
      </button>
      <button id="reflect-tab-write" onclick="switchReflectTab('write')"
        style="flex:1;padding:9px 0;font-size:14px;font-weight:700;border:none;border-radius:0 12px 12px 0;cursor:pointer;transition:all 0.2s;">
        Reflektieren
      </button>
    </div>
    <!-- READ panel -->
    <div id="reflect-panel-read" class="scrollable flex-1" style="display:flex;flex-direction:column;"></div>
    <!-- WRITE panel -->
    <div id="reflect-panel-write" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="reflection-header" style="margin:0 16px 10px;flex-shrink:0;">
        <div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Reflexionssatz</div>
        <div style="font-size:15px;font-weight:700;line-height:1.4;" id="reflect-stem-text"></div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px;" id="reflect-count"></div>
      </div>
      <div class="scrollable flex-1" id="reflect-entries"></div>
      <div class="input-bar">
        <textarea class="stem-input" id="reflect-input" placeholder="Gedanke …" rows="1"></textarea>
        <button class="send-btn" id="reflect-send">&#9650;</button>
      </div>
    </div>
  </div>


  <!-- SPIEGEL PROTOKOLL -->
  <div class="screen" id="screen-mirror">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));padding-bottom:4px;">
      <button class="back-btn" id="mirror-back">&#8249; Guide</button>
      <div style="font-size:13px;color:var(--text3);">Spiegel&#252;bung</div>
    </div>
    <div class="scrollable flex-1" id="mirror-scroll"></div>
  </div>

  <!-- SICHTBARKEIT -->
  <div class="screen" id="screen-visibility">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));padding-bottom:4px;">
      <button class="back-btn" id="visibility-back">&#8249; Guide</button>
      <div style="font-size:13px;color:var(--text3);">Sichtbarkeit</div>
    </div>
    <div class="scrollable flex-1" id="visibility-scroll"></div>
  </div>

  <!-- GUIDE -->
  <div class="screen" id="screen-guide">
    <div class="top-bar">
      <div class="top-bar-title">Guide</div>
      <button class="icon-btn" id="theme-toggle4">&#9788;</button>
    </div>
    <div class="scrollable flex-1" id="guide-scroll"></div>
  </div>


  <!-- BUCH -->
  <div class="screen" id="screen-buch">
    <div class="top-bar">
      <div class="top-bar-title">Das Buch</div>
      <button class="icon-btn" id="theme-toggle5">&#9881;</button>
    </div>
    <div class="scrollable flex-1" id="buch-scroll"></div>
  </div>

  <!-- BUCH KAPITEL DETAIL -->
  <div class="screen" id="screen-chapter">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));">
      <button class="back-btn" id="chapter-back">&#8249; Das Buch</button>
    </div>
    <div class="scrollable flex-1" id="chapter-scroll"></div>
  </div>



  <!-- EXPORT -->
  <div class="screen" id="screen-export">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));padding-bottom:4px;">
      <button class="back-btn" id="export-back">&#8249; Zurück</button>
      <div style="font-size:13px;color:var(--text3);" id="export-week-label"></div>
    </div>
    <div class="scrollable flex-1" id="export-scroll"></div>
  </div>

  <!-- EINTRAEGE UEBERSICHT -->
  <div class="screen" id="screen-entries">
    <div class="top-bar" style="padding-top:max(16px,env(safe-area-inset-top));">
      <button class="back-btn" id="entries-back">&#8249; Heute</button>
      <div style="font-size:13px;color:var(--text3);">Alle Einträge</div>
    </div>
    <div style="padding:0 16px 8px;flex-shrink:0;">
      <input type="text" id="entries-search" placeholder="Suchen …"
        style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;"
        oninput="filterEntries(this.value)">
    </div>
    <div class="scrollable flex-1" id="entries-scroll"></div>
  </div>

  <!-- NAV -->
  <div class="nav-bar">
    <div class="nav-item active" data-screen="home" onclick="navTo('home')">
      <div class="nav-icon">&#9679;</div>
      <div class="nav-label">Heute</div>
    </div>
    <div class="nav-item" data-screen="weeks" onclick="navTo('weeks')">
      <div class="nav-icon">&#9776;</div>
      <div class="nav-label">Wochen</div>
    </div>
    <div class="nav-item" data-screen="buch" onclick="navTo('buch')">
      <div class="nav-icon">&#9670;</div>
      <div class="nav-label">Buch</div>
    </div>
    <div class="nav-item" data-screen="guide" onclick="navTo('guide')">
      <div class="nav-icon">&#9432;</div>
      <div class="nav-label">Guide</div>
    </div>
  </div>
</div>

<div id="accent-modal">
  <div id="accent-sheet">
    <div class="accent-title">Darstellung</div>
    <div id="accent-swatches"></div>
    <div style="height:1px;background:var(--border);margin:12px 0;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;margin-bottom:14px;">
      <span style="font-size:15px;font-weight:600;">Dunkler Modus</span>
      <button id="dark-mode-toggle" style="background:none;border:none;cursor:pointer;padding:0;font-size:24px;">&#9680;</button>
    </div>
    <button id="accent-close">Fertig</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== DATA ====================
var WEEKS = [

function getAccent() {
  var a = state.accent || 'green';
  for (var i = 0; i < ACCENTS.length; i++) { if (ACCENTS[i].id === a) return ACCENTS[i]; }
  return ACCENTS[0];
}

function applyAccent() {
  var a = getAccent();
  var r = a.rgb;
  document.documentElement.style.setProperty('--accent', a.hex);
  document.documentElement.style.setProperty('--accent-rgb', r);
  document.documentElement.style.setProperty('--accent2',  'rgba(' + r + ',0.18)');
  document.documentElement.style.setProperty('--accent-25','rgba(' + r + ',0.25)');
  document.documentElement.style.setProperty('--accent-20','rgba(' + r + ',0.20)');
  document.documentElement.style.setProperty('--accent-15','rgba(' + r + ',0.15)');
  document.documentElement.style.setProperty('--accent-12','rgba(' + r + ',0.12)');
  document.documentElement.style.setProperty('--accent-07','rgba(' + r + ',0.07)');
}

function loadData() {
  try {
    var s = localStorage.getItem('se_state');
    if (s) {
      var o = JSON.parse(s);
      for (var k in o) state[k] = o[k];
      // Migration: ensure accent is always set
      if (!state.accent) state.accent = 'ghost';
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('se_state', JSON.stringify(state)); } catch(e) {}
}

function getEntries(week, day, stem) {
  var key = 'se_e_' + week + '_' + day + '_' + stem;
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}

function saveEntries(week, day, stem, arr) {
  var key = 'se_e_' + week + '_' + day + '_' + stem;
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}

function getReflection(week) {
  var key = 'se_r_' + week;
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}

function saveReflection(week, arr) {
  var key = 'se_r_' + week;
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}

function isDayDone(week, day) {
  var stems = WEEKS[week].stems;
  for (var i = 0; i < stems.length; i++) {
    if (getEntries(week, day, i).length >= 6) return true;
  }
  return false;
}

function allDaysDone(week) {
  for (var d = 0; d < 5; d++) {
    if (!isDayDone(week, d)) return false;
  }
  return true;
}

function isWeekDone(week) {
  return allDaysDone(week) && getReflection(week).length >= 1;
}

function getTotalEntries(week) {
  var total = 0;
  for (var d = 0; d < 5; d++) {
    for (var s = 0; s < WEEKS[week].stems.length; s++) {
      total += getEntries(week, d, s).length;
    }
  }
  total += getReflection(week).length;
  return total;
}

function getDayEntryCount(week, day) {
  var total = 0;
  for (var s = 0; s < WEEKS[week].stems.length; s++) {
    total += getEntries(week, day, s).length;
  }
  return total;
}

function checkAutoAdvance() {
  // Check if current day is done -> advance day
  if (isDayDone(state.currentWeek, state.currentDay)) {
    if (state.currentDay < 4) {
      state.currentDay++;
      saveState();
      return true;
    }
  }
  return false;
}

function checkWeekDone() {
  if (isWeekDone(state.currentWeek)) {
    if (state.currentWeek < 30) {
      state.currentWeek++;
      state.currentDay = 0;
      saveState();
      return true;
    }
  }
  return false;
}

// ==================== THEME ====================
function applyTheme() {
  if (state.darkMode) {
    document.body.classList.remove('light-mode');
  } else {
    document.body.classList.add('light-mode');
  }
  applyAccent();
}

function toggleTheme() {
  state.darkMode = !state.darkMode;
  saveState();
  applyTheme();
}

// ==================== NAV ====================
var currentScreen = 'home';
var screenStack = [];

function navTo(screen) {
  var old = document.getElementById('screen-' + currentScreen);
  if (old) old.classList.remove('active');
  currentScreen = screen;
  screenStack = []; // clear sub-screen stack
  var el = document.getElementById('screen-' + screen);
  if (el) el.classList.add('active');
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', items[i].getAttribute('data-screen') === screen);
  }
  // Always show nav on main screens
  var navEl = document.querySelector('.nav-bar');
  if (navEl) navEl.classList.remove('hidden');
  if (screen === 'home') renderHome();
  if (screen === 'weeks') renderWeeks();
  if (screen === 'guide') renderGuide();
  if (screen === 'buch') renderBuch();
}

var NAV_SCREENS = ['home', 'weeks', 'guide', 'buch'];

function pushScreen(screen) {
  screenStack.push(currentScreen);
  var old = document.getElementById('screen-' + currentScreen);
  if (old) old.classList.remove('active');
  currentScreen = screen;
  var el = document.getElementById('screen-' + screen);
  if (el) el.classList.add('active');
  // Hide nav bar on sub-screens
  var navEl = document.querySelector('.nav-bar');
  if (navEl) {
    var isNavScreen = false;
    for (var ni = 0; ni < NAV_SCREENS.length; ni++) { if (NAV_SCREENS[ni] === screen) isNavScreen = true; }
    navEl.classList.toggle('hidden', !isNavScreen);
  }
}

function popScreen() {
  var prev = screenStack.pop() || 'home';
  var old = document.getElementById('screen-' + currentScreen);
  if (old) old.classList.remove('active');
  currentScreen = prev;
  var el = document.getElementById('screen-' + prev);
  if (el) el.classList.add('active');
  // Show/hide nav bar
  var navEl = document.querySelector('.nav-bar');
  if (navEl) {
    var isNavScreen = false;
    for (var ni = 0; ni < NAV_SCREENS.length; ni++) { if (NAV_SCREENS[ni] === prev) isNavScreen = true; }
    navEl.classList.toggle('hidden', !isNavScreen);
  }
  if (prev === 'home') renderHome();
  if (prev === 'weeks') renderWeeks();
  if (prev === 'detail') renderDetail(state.focusWeek);
}

// ==================== WEEK LIST ====================
function renderWeeks() {
  var html = '<div style="padding:8px 0;">';
  for (var i = 0; i < 31; i++) {
    var done = isWeekDone(i);
    var isCurrent = i === state.currentWeek;
    html += '<div class="week-item ' + (isCurrent ? 'current-week' : '') + '" onclick="openDetail(' + i + ')">';
    html += '<div class="week-num ' + (done ? 'done' : '') + '">' + (done ? '&#10003;' : (i+1)) + '</div>';
    html += '<div class="week-info">';
    html += '<div class="week-name">' + esc(WEEKS[i].theme) + '</div>';
    html += '<div class="week-sub">Woche ' + (i+1) + ' · ' + WEEKS[i].stems.length + ' Sätze · ' + getTotalEntries(i) + ' Einträge</div>';
    html += '</div>';
    if (done) {
      html += '<div class="week-arrow" style="color:var(--accent);">&#10003;</div>';
    } else {
      html += '<div class="week-arrow">&#8250;</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('weeks-scroll').innerHTML = html;
}

// ==================== DETAIL ====================
function openDetail(w) {
  state.focusWeek = w;
  pushScreen('detail');
  renderDetail(w);
}

    var dayDone = isDayDone(w, d);

    html += '<div>';
    html += '<div style="font-size:15px;font-weight:600;">Tag ' + (d+1) + (isCurrentDay ? ' <span style=\'color:var(--accent);font-size:12px;\'>&#9679; Aktiv</span>' : '') + '</div>';

  html += '<div style="display:flex;align-items:center;justify-content:space-between;">';
  html += '<div style="display:flex;align-items:center;gap:10px;">';
  html += '<div class="check-circle ' + (reflDone ? 'done' : '') + '">' + (reflDone ? '&#10003;' : '') + '</div>';
  html += '<div>';
  html += '<div style="font-size:15px;font-weight:600;">Wochenreflexion</div>';
  html += '<div style="font-size:12px;color:var(--text3);margin-top:2px;">' + getReflection(w).length + ' Einträge</div>';

  html += '<div style="color:var(--text3);">&#8250;</div>';

  if (weekTotal >= 3) {
    html += '<div class="section-title" style="margin-top:4px;">Export & Analyse</div>';
    html += '<div class="card" style="cursor:pointer;" onclick="openExport(' + w + ')">';
    html += '<div style="display:flex;align-items:center;gap:12px;">';
    html += '<div style="font-size:24px;">&#11015;</div>';
    html += '<div style="flex:1;">';
    html += '<div style="font-size:15px;font-weight:700;color:var(--accent);">Woche exportieren & analysieren</div>';

// ==================== FOCUS ====================
function openFocus(w, d, s) {
  state.focusWeek = w;
  state.focusDay = d;
  state.focusStem = s;
  pushScreen('focus');
  renderFocus();
}

function renderFocus() {
  var w = state.focusWeek;
  var d = state.focusDay;
  var s = state.focusStem;
  var wk = WEEKS[w];

  document.getElementById('focus-header-right').textContent = 'W' + (w+1) + ' · T' + (d+1);

  // Stem info
  var cnt = getEntries(w, d, s).length;
  var ready = cnt >= 6;
  var stemHtml = '<div class="stem-card active-stem">';
  stemHtml += '<div class="stem-title">Aktueller Satz</div>';
  stemHtml += '<div class="stem-text">' + esc(wk.stems[s]) + '</div>';
  stemHtml += '<div class="stem-count ' + (ready ? 'ready' : '') + '">' + cnt + '/6 Einträge' + (ready ? ' &#10003; Fertig!' : ' – Noch ' + (6-cnt) + ' nötig') + '</div>';
  stemHtml += '</div>';
  document.getElementById('focus-stem-info').innerHTML = stemHtml;

  // Day tabs
  var dayHtml = '';
  for (var di = 0; di < 5; di++) {
    var dayDone = isDayDone(w, di);
    dayHtml += '<div class="tab ' + (di === d ? 'active' : (dayDone ? 'done-tab' : '')) + '" onclick="switchFocusDay(' + di + ')">Tag ' + (di+1) + (dayDone && di !== d ? ' &#10003;' : '') + '</div>';
  }
  document.getElementById('focus-day-tabs').innerHTML = dayHtml;

  // Stem tabs
  var stemTabHtml = '';
  for (var si = 0; si < wk.stems.length; si++) {
    var sCnt = getEntries(w, d, si).length;
    var sReady = sCnt >= 6;
    stemTabHtml += '<div class="tab ' + (si === s ? 'active' : (sReady ? 'done-tab' : '')) + '" onclick="switchFocusStem(' + si + ')">S' + (si+1) + (sReady && si !== s ? '&#10003;' : '') + '</div>';
  }
  document.getElementById('focus-stem-tabs').innerHTML = stemTabHtml;

  renderFocusEntries();
}

function renderFocusEntries() {
  var w = state.focusWeek;
  var d = state.focusDay;
  var s = state.focusStem;
  var entries = getEntries(w, d, s);

  var html = '';
  if (entries.length === 0) {
    html = '<div class="empty-state"><div class="empty-icon"></div><div class="empty-text">Vervollständige den Satz mindestens 6 Mal.<br>Schreib spontan – ohne zu überlegen.</div></div>';
  } else {
    html = '<div style="padding:0 16px;">';
    for (var i = entries.length - 1; i >= 0; i--) {
      var idx = i;
      html += '<div class="entry-item">';
      html += '<div style="color:var(--text3);font-size:12px;padding-top:3px;min-width:20px;">' + (i+1) + '</div>';
      html += '<div class="entry-text">' + esc(entries[i]) + '</div>';
      html += '<button class="entry-del" onclick="delEntry(' + idx + ')">&#10005;</button>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('focus-entries').innerHTML = html;
  document.getElementById('focus-input').value = '';
}

function switchFocusDay(d) {
  state.focusDay = d;
  renderFocus();
}

function switchFocusStem(s) {
  state.focusStem = s;
  renderFocus();
}

function delEntry(idx) {
  var w = state.focusWeek;
  var d = state.focusDay;
  var s = state.focusStem;
  var entries = getEntries(w, d, s);
  entries.splice(idx, 1);
  saveEntries(w, d, s, entries);
  renderFocus();
}

function addFocusEntry() {
  var input = document.getElementById('focus-input');
  var val = input.value.trim();
  if (!val) return;
  var w = state.focusWeek;
  var d = state.focusDay;
  var s = state.focusStem;
  var entries = getEntries(w, d, s);
  entries.push(val);
  saveEntries(w, d, s, entries);
  input.value = '';
  input.style.height = '42px';
  renderFocus();
  if (entries.length === 6) showToast('&#10003; Satz ' + (s+1) + ' abgeschlossen!');
}

function closeFocus() {
  var w = state.focusWeek;
  var d = state.focusDay;
  // Auto-advance if done
  if (w === state.currentWeek && d === state.currentDay) {
    if (isDayDone(w, d)) {
      if (state.currentDay < 4) {
        state.currentDay++;
        saveState();
        showToast('&#10003; Tag ' + d + ' fertig! Tag ' + (state.currentDay+1) + ' freigeschaltet.');
      } else {
        saveState();
        showToast('&#10003; Alle 5 Tage abgeschlossen! Jetzt reflektieren.');
      }
    }
  }
  popScreen();
}

// ==================== REFLECTION ====================
function openReflect(w) {
  state.reflectWeek = w;
  // Start on read tab if there are week entries to read, else go straight to write
  var hasEntries = getTotalEntries(w) > 0;
  reflectTab = hasEntries ? 'read' : 'write';
  pushScreen('reflect');
  renderReflect();
}

var reflectTab = 'read'; // 'read' | 'write'

function switchReflectTab(tab) {
  reflectTab = tab;
  renderReflect();
}

function renderReflect() {
  var w = state.reflectWeek;
  document.getElementById('reflect-week-label').textContent = 'Woche ' + (w+1);

  // Style tabs
  var tabRead = document.getElementById('reflect-tab-read');
  var tabWrite = document.getElementById('reflect-tab-write');
  var panelRead = document.getElementById('reflect-panel-read');
  var panelWrite = document.getElementById('reflect-panel-write');
  if (!tabRead || !panelRead) return;

  var isRead = reflectTab === 'read';
  tabRead.style.background = isRead ? 'var(--accent)' : 'var(--card2)';
  tabRead.style.color = isRead ? '#000' : 'var(--text2)';
  tabWrite.style.background = !isRead ? 'var(--accent)' : 'var(--card2)';
  tabWrite.style.color = !isRead ? '#000' : 'var(--text2)';
  panelRead.style.display = isRead ? 'flex' : 'none';
  panelWrite.style.display = !isRead ? 'flex' : 'none';

  if (isRead) {
    renderReflectReadPanel(w);
  } else {
    renderReflectWritePanel(w);
  }
}

function renderReflectReadPanel(w) {
  var wk = WEEKS[w];
  var totalEntries = 0;
  var html = '<div class="fade-in" style="padding-bottom:16px;">';

  // Branden instruction
  html += '<div style="margin:8px 16px 12px;padding:14px 16px;background:linear-gradient(135deg,rgba(255,159,10,0.12),rgba(255,159,10,0.04));border:1px solid rgba(255,159,10,0.25);border-radius:14px;">';
  html += '<div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px;">Brandons Methode</div>';
  html += '<div style="font-size:13px;line-height:1.6;color:var(--text2);">Lies alle Einträge der Woche durch. Nimm dir Zeit. Dann wechsle zu <strong style="color:var(--text);">Reflektieren</strong>.</div>';
  html += '</div>';

  // All days
  var hasAny = false;
  for (var d = 0; d < 5; d++) {
    var dayTotal = getDayEntryCount(w, d);
    if (dayTotal === 0) continue;
    hasAny = true;

    html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:8px 20px 5px;">Tag ' + (d+1) + '</div>';
    for (var s = 0; s < wk.stems.length; s++) {
      var entries = getEntries(w, d, s);
      if (entries.length === 0) continue;
      totalEntries += entries.length;
      html += '<div class="card" style="padding:0;margin-bottom:8px;">';
      html += '<div style="padding:10px 14px 6px;font-size:12px;font-weight:600;color:var(--accent);line-height:1.4;">' + esc(wk.stems[s]) + '</div>';
      for (var e = 0; e < entries.length; e++) {
        html += '<div style="padding:6px 14px;font-size:14px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);">';
        html += '<span style="color:var(--text3);font-size:11px;margin-right:6px;">' + (e+1) + '</span>' + esc(entries[e]);
        html += '</div>';
      }
      html += '</div>';
    }
  }

  // Weekend reflection entries if any
  var reflEntries = getReflection(w);
  if (reflEntries.length > 0) {
    hasAny = true;
    html += '<div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.7px;padding:8px 20px 5px;">Reflexion</div>';
    html += '<div class="card" style="padding:0;margin-bottom:8px;">';
    for (var r = 0; r < reflEntries.length; r++) {
      html += '<div style="padding:8px 14px;font-size:14px;color:var(--text2);line-height:1.5;' + (r > 0 ? 'border-top:1px solid var(--border);' : '') + '">';
      html += '<span style="color:var(--text3);font-size:11px;margin-right:6px;">' + (r+1) + '</span>' + esc(reflEntries[r]);
      html += '</div>';
    }
    html += '</div>';
  }

  if (!hasAny) {
    html += '<div class="empty-state"><div class="empty-icon">&#9998;</div><div class="empty-text">Noch keine Einträge diese Woche.<br>Schreibe zuerst im Fokus-Modus.</div></div>';
  } else {
    // CTA to switch to write
    html += '<div style="padding:0 16px 8px;">';
    html += '<button onclick="switchReflectTab(\'write\')" style="width:100%;background:var(--accent);color:#000;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">Jetzt reflektieren &#8250;</button>';
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('reflect-panel-read').innerHTML = html;
}

function renderReflectWritePanel(w) {
  document.getElementById('reflect-stem-text').textContent = REFLECTION_STEM;
  var entries = getReflection(w);
  document.getElementById('reflect-count').textContent = entries.length + ' Einträge';

  var html = '';
  if (entries.length === 0) {
    html = '<div class="empty-state" style="padding:24px 20px;"><div class="empty-icon">&#128221;</div><div class="empty-text">Vervollständige den Reflexionssatz<br>mindestens 6 Mal.</div></div>';
  } else {
    html = '<div style="padding:0 16px;">';
    for (var i = entries.length - 1; i >= 0; i--) {
      var idx = i;
      html += '<div class="entry-item">';
      html += '<div style="color:var(--text3);font-size:12px;padding-top:3px;min-width:20px;">' + (i+1) + '</div>';
      html += '<div class="entry-text">' + esc(entries[i]) + '</div>';
      html += '<button class="entry-del" onclick="delReflection(' + idx + ')">&#10005;</button>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('reflect-entries').innerHTML = html;
  document.getElementById('reflect-input').value = '';
}

function delReflection(idx) {
  var w = state.reflectWeek;
  var entries = getReflection(w);
  entries.splice(idx, 1);
  saveReflection(w, entries);
  renderReflect();
}

function addReflectionEntry() {
  var input = document.getElementById('reflect-input');
  var val = input.value.trim();
  if (!val) return;
  var w = state.reflectWeek;
  var entries = getReflection(w);
  entries.push(val);
  saveReflection(w, entries);
  input.value = '';
  input.style.height = '42px';
  renderReflectWritePanel(w);
  // Check week done
  if (w === state.currentWeek && isWeekDone(w)) {
    if (state.currentWeek < 30) {
      var old = state.currentWeek + 1;
      state.currentWeek++;
      state.currentDay = 0;
      saveState();
      showToast('&#127881; Woche ' + w + ' abgeschlossen! Woche ' + old + ' freigeschaltet!');
    } else {
      showToast('&#127881; Programm abgeschlossen! Herzlichen Glückwunsch!');
    }
  }
  document.getElementById('reflect-count').textContent = entries.length + ' Einträge';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// ==================== ACCENT PICKER ====================
function renderAccentSwatches() {
  var html = '<div class="theme-grid">';
  for (var i = 0; i < ACCENTS.length; i++) {
    var a = ACCENTS[i];
    var sel = a.id === state.accent;
    html += '<div class="theme-card' + (sel ? ' selected' : '') + '" ';
    html += 'style="background:' + a.card + ';" ';
    html += 'onclick="selectAccent(\'' + a.id + '\')">';
    html += '<div style="position:absolute;top:12px;left:12px;width:12px;height:12px;border-radius:50%;background:' + a.hex + ';box-shadow:0 0 8px ' + a.hex + ';"></div>';
    html += '<div class="theme-label">' + a.label + '</div>';
    html += '<div class="theme-sub">' + a.sub + '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('accent-swatches').innerHTML = html;
}
function selectAccent(id) {
  state.accent = id;
  saveState();
  applyAccent();
  renderAccentSwatches();
}

function openAccentModal() {
  renderAccentSwatches();
  var dmBtn = document.getElementById('dark-mode-toggle');
  if (dmBtn) dmBtn.innerHTML = state.darkMode ? '&#9680;' : '&#9728;';
  document.getElementById('accent-modal').classList.add('open');
}

document.getElementById('accent-close').addEventListener('click', function() {
  document.getElementById('accent-modal').classList.remove('open');
});
document.getElementById('dark-mode-toggle').addEventListener('click', function() {
  state.darkMode = !state.darkMode;
  saveState();
  applyTheme();
  this.innerHTML = state.darkMode ? '&#9680;' : '&#9728;';
});
document.getElementById('accent-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ==================== BUCH FUNCTIONS ====================
var currentChapterIdx = 0;

function renderBuch() {
  var html = '<div class="fade-in">';

  // Header quote
  html += '<div class="card" style="margin-top:8px;background:linear-gradient(135deg,rgba(10,132,255,0.12),rgba(10,132,255,0.04));border-color:rgba(10,132,255,0.2);">';
  html += '<div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Nathaniel Branden</div>';
  html += '<div style="font-size:15px;line-height:1.65;color:var(--text2);font-style:italic;">&bdquo;Selbstwert ist das Immunsystem des Bewusstseins.&ldquo;</div>';
  html += '</div>';

  var currentPart = null;
  for (var i = 0; i < CHAPTERS.length; i++) {
    var ch = CHAPTERS[i];
    if (ch.part && ch.part !== currentPart) {
      currentPart = ch.part;
      html += '<div style="font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:14px 20px 6px;">' + esc(ch.part) + '</div>';
    }
    html += '<div class="card" style="cursor:pointer;padding:14px 16px;" onclick="openChapter(' + i + ')">';
    html += '<div style="display:flex;align-items:center;gap:12px;">';
    // Icon badge
    html += '<div style="width:40px;height:40px;border-radius:12px;background:var(--accent2);color:var(--accent);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + ch.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:2px;">' + esc(ch.label) + '</div>';
    html += '<div style="font-size:15px;font-weight:700;line-height:1.3;">' + esc(ch.title) + '</div>';
    html += '<div style="font-size:12px;color:var(--text3);margin-top:2px;">' + esc(ch.subtitle) + '</div>';
    html += '</div>';
    html += '<div style="color:var(--text3);font-size:16px;">&#8250;</div>';
    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('buch-scroll').innerHTML = html;
}

function openChapter(idx) {
  currentChapterIdx = idx;
  pushScreen('chapter');
  renderChapter();
}

function renderChapter() {
  var ch = CHAPTERS[currentChapterIdx];
  var html = '<div class="fade-in" style="padding-bottom:32px;">';

  // Hero
  html += '<div style="margin:0 16px 14px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:18px;">';
  html += '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">' + esc(ch.label) + '</div>';
  html += '<div style="font-size:24px;font-weight:800;line-height:1.25;margin-bottom:6px;">' + esc(ch.title) + '</div>';
  html += '<div style="font-size:14px;color:var(--text2);">' + esc(ch.subtitle) + '</div>';
  html += '</div>';

  // Kerngedanken
  html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 20px;margin-bottom:8px;">Kerngedanken</div>';
  html += '<div class="card" style="padding:0;">';
  for (var i = 0; i < ch.keypoints.length; i++) {
    html += '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:' + (i < ch.keypoints.length-1 ? '1px solid var(--border)' : 'none') + ';">';
    html += '<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">' + (i+1) + '</div>';
    html += '<div style="font-size:14px;line-height:1.5;color:var(--text);">' + esc(ch.keypoints[i]) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Zusammenfassung
  html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 20px;margin-bottom:8px;margin-top:6px;">Zusammenfassung</div>';
  html += '<div class="card">';
  html += '<div style="font-size:15px;line-height:1.75;color:var(--text2);">' + esc(ch.summary) + '</div>';
  html += '</div>';

  // Zitat
  html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 20px;margin-bottom:8px;margin-top:6px;">Brandons Zitat</div>';
  html += '<div class="card" style="background:linear-gradient(135deg,var(--accent-12),var(--accent-07));border-color:var(--accent-25);">';
  html += '<div style="font-size:15px;line-height:1.7;color:var(--text);font-style:italic;">&bdquo;' + esc(ch.quote) + '&ldquo;</div>';
  html += '<div style="font-size:12px;color:var(--text3);margin-top:8px;">&#8212; Nathaniel Branden</div>';
  html += '</div>';

  // Umsetzung / Actions
  var actions = CHAPTER_ACTIONS[currentChapterIdx];
  if (actions && actions.length > 0) {
    html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:0 20px;margin-bottom:8px;margin-top:6px;">Jetzt umsetzen</div>';
    html += '<div class="card" style="padding:0;">';
    for (var ai = 0; ai < actions.length; ai++) {
      var a = actions[ai];
      html += '<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:' + (ai < actions.length-1 ? '1px solid var(--border)' : 'none') + ';">';
      html += '<div style="width:36px;height:36px;border-radius:10px;background:var(--accent2);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + a.icon + '</div>';
      html += '<div style="flex:1;min-width:0;">';
      html += '<div style="font-size:14px;font-weight:700;margin-bottom:3px;">' + esc(a.title) + '</div>';
      html += '<div style="font-size:13px;color:var(--text2);line-height:1.5;">' + esc(a.desc) + '</div>';
      html += '</div></div>';
    }
    html += '</div>';
  }

  // Navigation prev/next
  html += '<div style="display:flex;gap:10px;padding:0 16px;margin-top:8px;">';
  if (currentChapterIdx > 0) {
    html += '<div class="card" style="flex:1;cursor:pointer;text-align:center;padding:12px;" onclick="openChapter(' + (currentChapterIdx-1) + ')">';
    html += '<div style="font-size:11px;color:var(--text3);margin-bottom:2px;">&#8249; Vorheriges</div>';
    html += '<div style="font-size:13px;font-weight:600;">' + esc(CHAPTERS[currentChapterIdx-1].title) + '</div>';
    html += '</div>';
  }
  if (currentChapterIdx < CHAPTERS.length-1) {
    html += '<div class="card" style="flex:1;cursor:pointer;text-align:center;padding:12px;" onclick="openChapter(' + (currentChapterIdx+1) + ')">';
    html += '<div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Nächstes &#8250;</div>';
    html += '<div style="font-size:13px;font-weight:600;">' + esc(CHAPTERS[currentChapterIdx+1].title) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '</div>';
  document.getElementById('chapter-scroll').innerHTML = html;
  document.getElementById('chapter-scroll').scrollTop = 0;
}

function getTodayQuote() {
  // Deterministic per day — same quote all day, rotates daily
  var now = new Date();
  var dayIndex = Math.floor(now.getTime() / 86400000) % QUOTES.length;
  return QUOTES[dayIndex];
}

function getTodayChallenge() {
  var w = state.currentWeek;
  var d = state.currentDay;
  var challenges = MICRO_CHALLENGES[w] || MICRO_CHALLENGES[0];
  return challenges[Math.min(d, challenges.length - 1)];
}

function getChallengeKey() {
  return 'se_challenge_' + state.currentWeek + '_' + state.currentDay;
}

function isChallengeChecked() {
  try { return localStorage.getItem(getChallengeKey()) === '1'; } catch(e) { return false; }
}

function setChallengeDone(done) {
  try { localStorage.setItem(getChallengeKey(), done ? '1' : '0'); } catch(e) {}
}

function toggleChallenge() {
  var done = !isChallengeChecked();
  setChallengeDone(done);
  if (done) showToast('Challenge erledigt! \uD83D\uDCAA');
  renderHome();
}

// ==================== EINTRAEGE UEBERSICHT ====================
var allEntriesCache = [];
var allEntriesFiltered = [];

function buildAllEntries() {
  allEntriesCache = [];
  for (var w = 0; w < 31; w++) {
    for (var d = 0; d < 5; d++) {
      for (var s = 0; s < WEEKS[w].stems.length; s++) {
        var entries = getEntries(w, d, s);
        for (var e = 0; e < entries.length; e++) {
          allEntriesCache.push({
            text: entries[e],
            stem: WEEKS[w].stems[s],
            week: w,
            day: d,
            stemIdx: s
          });
        }
      }
    }
    var refl = getReflection(w);
    for (var r = 0; r < refl.length; r++) {
      allEntriesCache.push({
        text: refl[r],
        stem: 'Wochenreflexion',
        week: w,
        day: -1,
        stemIdx: -1
      });
    }
  }
  // Most recent first
  allEntriesCache.reverse();
  allEntriesFiltered = allEntriesCache.slice();
}

function openEntriesOverview() {
  buildAllEntries();
  pushScreen('entries');
  renderEntriesList('');
}

function filterEntries(query) {
  var q = query.toLowerCase().trim();
  if (!q) {
    allEntriesFiltered = allEntriesCache.slice();
  } else {
    allEntriesFiltered = [];
    for (var i = 0; i < allEntriesCache.length; i++) {
      var e = allEntriesCache[i];
      if (e.text.toLowerCase().indexOf(q) >= 0 || e.stem.toLowerCase().indexOf(q) >= 0) {
        allEntriesFiltered.push(e);
      }
    }
  }
  renderEntriesList(query);
}

function renderEntriesList(query) {
  var total = allEntriesCache.length;
  var shown = allEntriesFiltered.length;
  var html = '';

  if (total === 0) {
    html = '<div class="empty-state"><div class="empty-icon">&#9998;</div><div class="empty-text">Noch keine Eintr\u00e4ge vorhanden.<br>Starte das Programm auf dem Heute-Tab.</div></div>';
    document.getElementById('entries-scroll').innerHTML = html;
    return;
  }

  // Stats bar
  html += '<div style="display:flex;gap:8px;padding:0 16px 10px;">';
  html += '<div class="stat-card" style="text-align:center;"><div class="stat-num">' + total + '</div><div class="stat-label">Gesamt</div></div>';
  html += '<div class="stat-card" style="text-align:center;"><div class="stat-num">' + shown + '</div><div class="stat-label">' + (query ? 'Gefunden' : 'Angezeigt') + '</div></div>';
  var weeksWithEntries = 0;
  for (var ww = 0; ww < 31; ww++) { if (getTotalEntries(ww) > 0) weeksWithEntries++; }
  html += '<div class="stat-card" style="text-align:center;"><div class="stat-num">' + weeksWithEntries + '</div><div class="stat-label">Wochen aktiv</div></div>';
  html += '</div>';

  if (shown === 0) {
    html += '<div class="empty-state"><div class="empty-icon">&#128270;</div><div class="empty-text">Keine Eintr\u00e4ge gefunden.</div></div>';
    document.getElementById('entries-scroll').innerHTML = html;
    return;
  }

  // Group by week
  var grouped = {};
  var groupOrder = [];
  for (var i = 0; i < allEntriesFiltered.length; i++) {
    var entry = allEntriesFiltered[i];
    var wLabel = 'Woche ' + (entry.week + 1) + ' \u2013 ' + WEEKS[entry.week].theme;
    if (!grouped[wLabel]) { grouped[wLabel] = []; groupOrder.push(wLabel); }
    grouped[wLabel].push(entry);
  }

  for (var gi = 0; gi < groupOrder.length; gi++) {
    var groupLabel = groupOrder[gi];
    var items = grouped[groupLabel];
    html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:8px 20px 6px;">' + esc(groupLabel) + '</div>';
    html += '<div class="card" style="padding:0;">';
    for (var ii = 0; ii < items.length; ii++) {
      var item = items[ii];
      var dayLabel = item.day >= 0 ? 'Tag ' + (item.day+1) : 'Reflexion';
      html += '<div style="padding:12px 16px;border-bottom:' + (ii < items.length-1 ? '1px solid var(--border)' : 'none') + ';">';
      html += '<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px;">' + esc(dayLabel) + (item.stemIdx >= 0 ? ' \u00b7 S' + (item.stemIdx+1) : '') + '</div>';
      html += '<div style="font-size:14px;line-height:1.5;">' + esc(item.text) + '</div>';
      if (query) {
        html += '<div style="font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;">' + esc(item.stem.substring(0,60)) + '\u2026</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  document.getElementById('entries-scroll').innerHTML = html;
}

function buildExportText(w, mode) {
  // mode: 'week' | 'all'
  var lines = [];
  var wk = WEEKS[w];

  if (mode === 'week') {
    lines.push('DIE SECHS SÄULEN DES SELBSTWERTS');
    lines.push('Nathaniel Branden – Satzergänzungs-Programm');
    lines.push('');
    lines.push('WOCHE ' + (w+1) + ': ' + wk.theme.toUpperCase());
    lines.push('=======================================');
    lines.push('');

    var hasContent = false;
    for (var d = 0; d < 5; d++) {
      var dayLines = [];
      for (var s = 0; s < wk.stems.length; s++) {
        var entries = getEntries(w, d, s);
        if (entries.length > 0) {
          dayLines.push('  Satzanfang: ' + wk.stems[s]);
          for (var e = 0; e < entries.length; e++) {
            dayLines.push('  -> ' + entries[e]);
          }
          dayLines.push('');
        }
      }
      if (dayLines.length > 0) {
        hasContent = true;
        lines.push('TAG ' + (d+1));
        lines.push('---------------------------------------');
        lines = lines.concat(dayLines);
      }
    }

    var refl = getReflection(w);
    if (refl.length > 0) {
      hasContent = true;
      lines.push('WOCHENREFLEXION');
      lines.push('---------------------------------------');
      lines.push('  Satzanfang: ' + 'Wenn irgendetwas von dem, was ich diese Woche geschrieben habe, wahr ist, wäre es hilfreich, wenn ich –');
      for (var r = 0; r < refl.length; r++) {
        lines.push('  -> ' + refl[r]);
      }
      lines.push('');
    }

    if (!hasContent) return null;

    lines.push('');
    lines.push('=======================================');
    lines.push('ANALYSE-PROMPT FÜR CLAUDE/CHATGPT:');
    lines.push('---------------------------------------');
    lines.push('');
    lines.push('Bitte analysiere diese Satzergänzungs-Einträge aus Woche ' + (w+1) +
      ' ("' + wk.theme + '") des 31-Wochen-Selbstwert-Programms von Nathaniel Branden.');
    lines.push('');
    lines.push('Ich möchte folgendes von dir:');
    lines.push('1. MUSTER: Welche Themen oder Überzeugungen tauchen wiederholt auf?');
    lines.push('2. BLINDE FLECKEN: Was vermeide ich oder was fällt auf, das ich nicht sehe?');
    lines.push('3. KERNBOTSCHAFT: Was ist die wichtigste Erkenntnis dieser Woche in 1–2 Sätzen?');
    lines.push('4. NÄCHSTER SCHRITT: Eine konkrete Handlungsempfehlung für die nächste Woche.');
    lines.push('');
    lines.push('Sei konkret und beziehe dich auf meine echten Formulierungen. Sei direkt aber mitfühlend.');

  } else {
    // All weeks
    lines.push('DIE SECHS SÄULEN DES SELBSTWERTS');
    lines.push('Nathaniel Branden – Vollständige Satzergänzungs-Einträge');
    lines.push('Exportiert am: ' + new Date().toLocaleDateString('de-DE'));
    lines.push('');

    for (var wi = 0; wi < 31; wi++) {
      var total = getTotalEntries(wi);
      if (total === 0) continue;
      var wki = WEEKS[wi];
      lines.push('');
      lines.push('WOCHE ' + (wi+1) + ': ' + wki.theme.toUpperCase());
      lines.push('=======================================');
      for (var di = 0; di < 5; di++) {
        var dayHasContent = false;
        var dayBuf = [];
        for (var si = 0; si < wki.stems.length; si++) {
          var ents = getEntries(wi, di, si);
          if (ents.length > 0) {
            dayHasContent = true;
            dayBuf.push('  ' + wki.stems[si]);
            for (var ei = 0; ei < ents.length; ei++) {
              dayBuf.push('  -> ' + ents[ei]);
            }
          }
        }
        if (dayHasContent) {
          lines.push('Tag ' + (di+1) + ':');
          lines = lines.concat(dayBuf);
        }
      }
      var ri = getReflection(wi);
      if (ri.length > 0) {
        lines.push('Reflexion:');
        for (var rii = 0; rii < ri.length; rii++) {
          lines.push('  -> ' + ri[rii]);
        }
      }
    }
  }

  return lines.join('\n');
}

function copyToClipboard(text, btnId) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById(btnId);
      if (btn) { btn.textContent = '&#10003; Kopiert!'; setTimeout(function() { btn.textContent = '&#128203; In Zwischenablage kopieren'; }, 2500); }
    }).catch(function() { fallbackCopy(text, btnId); });
  } else {
    fallbackCopy(text, btnId);
  }
}

function fallbackCopy(text, btnId) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    var btn = document.getElementById(btnId);
    if (btn) { btn.textContent = '&#10003; Kopiert!'; setTimeout(function() { btn.textContent = '&#128203; In Zwischenablage kopieren'; }, 2500); }
  } catch(e) { showToast('Kopieren fehlgeschlagen – nutze Download.'); }
  document.body.removeChild(ta);
}

function downloadText(text, filename) {
  var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadJSON() {
  var backup = { version: 1, exported: Date.now(), weeks: [] };
  for (var w = 0; w < 31; w++) {
    var weekData = { week: w, theme: WEEKS[w].theme, days: [], reflection: getReflection(w) };
    for (var d = 0; d < 5; d++) {
      var stems = [];
      for (var s = 0; s < WEEKS[w].stems.length; s++) {
        stems.push({ stem: WEEKS[w].stems[s], entries: getEntries(w, d, s) });
      }
      weekData.days.push(stems);
    }
    backup.weeks.push(weekData);
  }
  backup.state = state;
  downloadText(JSON.stringify(backup, null, 2), 'saeulen-backup-' + new Date().toISOString().slice(0,10) + '.json');
  showToast('Backup gespeichert!');
}

// Mirror exercise log
function getMirrorLog() {
  try { var v = localStorage.getItem('se_mirror_log'); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}
function saveMirrorLog(arr) {
  try { localStorage.setItem('se_mirror_log', JSON.stringify(arr.slice(-90))); } catch(e) {} // keep last 90 entries
}
function getMirrorToday() {
  try { return localStorage.getItem('se_mirror_today') === new Date().toDateString(); } catch(e) { return false; }
}
function setMirrorToday() {
  try { localStorage.setItem('se_mirror_today', new Date().toDateString()); } catch(e) {}
}

// Visibility journal
function getVisibilityEntries() {
  try { var v = localStorage.getItem('se_visibility'); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}
function saveVisibilityEntries(arr) {
  try { localStorage.setItem('se_visibility', JSON.stringify(arr)); } catch(e) {}
}

var mirrorTimer = null;
var mirrorSeconds = 0;
var MIRROR_DURATION = 120; // 2 minutes

function startMirrorExercise() {
  mirrorSeconds = 0;
  mirrorPhase = 1;
  var area = document.getElementById('mirror-timer-area');
  if (!area) return;

  function updateTimer() {
    mirrorSeconds++;
    var remaining = MIRROR_DURATION - mirrorSeconds;
    var mins = Math.floor(remaining / 60);
    var secs = remaining % 60;
    var display = (secs < 10 ? '0' : '') + secs;
    var pct = Math.round((mirrorSeconds / MIRROR_DURATION) * 100);

    var timerEl = document.getElementById('mirror-timer-display');
    if (timerEl) timerEl.textContent = mins + ':' + display;

    var barEl = document.getElementById('mirror-progress-bar');
    if (barEl) barEl.style.width = pct + '%';

    if (mirrorSeconds >= MIRROR_DURATION) {
      clearInterval(mirrorTimer);
      completeMirror();
    }
  }

  area.innerHTML = '<div class="card" style="text-align:center;padding:32px 20px;">' +
    '<div style="font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.6;">&#8222;Was auch immer meine Fehler oder Unvollkommenheiten sind &#8211;<br>ich akzeptiere mich vorbehaltlos und vollst&#228;ndig.&#8220;</div>' +
    '<div id="mirror-timer-display" style="font-size:56px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent);margin:8px 0;">2:00</div>' +
    '<div style="font-size:13px;color:var(--text3);margin-bottom:16px;">Schau dir in die Augen. Atme tief.</div>' +
    '<div class="progress-bar" style="margin:0 0 20px;"><div id="mirror-progress-bar" class="progress-fill" style="width:0%;transition:width 1s linear;"></div></div>' +
    '<button onclick="stopMirror()" style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 24px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;">Abbrechen</button>' +
    '</div>';

  mirrorTimer = setInterval(updateTimer, 1000);
}

function stopMirror() {
  if (mirrorTimer) clearInterval(mirrorTimer);
  renderMirror();
}

function completeMirror() {
  setMirrorToday();
  var log = getMirrorLog();
  var now = new Date();
  log.push({
    date: now.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'short'}),
    duration: '2',
    ts: now.getTime()
  });
  saveMirrorLog(log);
  showToast('Spiegel\u00fcbung abgeschlossen \u2013 gut gemacht!');
  renderMirror();
}

function calcMirrorStreak(log) {
  if (log.length === 0) return 0;
  var today = new Date(); today.setHours(0,0,0,0);
  var streak = 0;
  var checkDate = new Date(today);
  for (var i = log.length - 1; i >= 0; i--) {
    var d = new Date(log[i].ts); d.setHours(0,0,0,0);
    if (d.getTime() === checkDate.getTime()) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else if (d.getTime() < checkDate.getTime()) {
      break;
    }
  }
  return streak;
}

function addVisibilityEntry() {
  var ta = document.getElementById('visibility-input');
  if (!ta) return;
  var val = ta.value.trim();
  if (!val) return;
  var entries = getVisibilityEntries();
  var now = new Date();
  entries.push({
    text: val,
    date: now.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'short'})
  });
  saveVisibilityEntries(entries);
  ta.value = ''; ta.style.height = '42px';
  renderVisibility();
}

function delVisibilityEntry(idx) {
  var entries = getVisibilityEntries();
  entries.splice(idx, 1);
  saveVisibilityEntries(entries);
  renderVisibility();
}

function openFocusStem(stem) {
  // Open a free-write mode with a custom stem
  state.customStem = stem;
  pushScreen('focus');
  renderFocusWithCustomStem(stem);
}

function renderFocusWithCustomStem(stem) {
  document.getElementById('focus-header-right').textContent = 'Sichtbarkeit';
  var stemHtml = '<div class="stem-card active-stem">';
  stemHtml += '<div class="stem-title">Satzanfang</div>';
  stemHtml += '<div class="stem-text">' + esc(stem) + '</div>';
  stemHtml += '<div class="stem-count">Freies Schreiben</div>';
  stemHtml += '</div>';
  document.getElementById('focus-stem-info').innerHTML = stemHtml;
  document.getElementById('focus-day-tabs').innerHTML = '';
  document.getElementById('focus-stem-tabs').innerHTML = '';

  var key = 'se_custom_' + btoa(unescape(encodeURIComponent(stem))).substring(0, 20);
  var entries = [];
  try { var v = localStorage.getItem(key); entries = v ? JSON.parse(v) : []; } catch(e) {}

  var html = '';
  if (entries.length === 0) {
    html = '<div class="empty-state"><div class="empty-icon">&#9998;</div><div class="empty-text">Vervollst\u00e4ndige den Satz mindestens 6 Mal.<br>Schreib spontan \u2013 ohne nachzudenken.</div></div>';
  } else {
    html = '<div style="padding:0 16px;">';
    for (var i = entries.length-1; i >= 0; i--) {
      html += '<div class="entry-item">';
      html += '<div style="color:var(--text3);font-size:12px;padding-top:3px;min-width:20px;">' + (i+1) + '</div>';
      html += '<div class="entry-text">' + esc(entries[i]) + '</div>';
      html += '<button class="entry-del" onclick="delCustomEntry(' + i + ',\'' + key + '\')">&#10005;</button>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('focus-entries').innerHTML = html;

  var sendBtn = document.getElementById('focus-send');
  if (sendBtn) {
    sendBtn.onclick = function() {
      var input = document.getElementById('focus-input');
      var val = input.value.trim();
      if (!val) return;
      try { var v = localStorage.getItem(key); var arr = v ? JSON.parse(v) : []; arr.push(val); localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
      input.value = ''; input.style.height = '42px';
      renderFocusWithCustomStem(stem);
    };
  }
}

function delCustomEntry(idx, key) {
  try {
    var v = localStorage.getItem(key); var arr = v ? JSON.parse(v) : [];
    arr.splice(idx, 1); localStorage.setItem(key, JSON.stringify(arr));
  } catch(e) {}
  renderFocusWithCustomStem(state.customStem || '');
}
